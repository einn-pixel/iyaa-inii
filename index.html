<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APAYAA</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<!-- icon search -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>

<body>

<div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</div>

<div class="container">
    <h1 class="logo">EinSeek</h1>


<form id="searchForm">
 
<div class="search-box">
<span class="material-icons icon">search</span>


<input
type="text" 
id="searchInput"
placeholder="Penelusuran..."
required>

</div>

<button type="submit" class="btn">Cari</button>

</form>

<div id="result"></div>

<footer>
    <div class="footer-tagline">"Temukan informasi dengan cepat dan mudah (>.<)"</div>
</footer>

<div class="language">
    Tersedia dalam bahasa:
    <a href="#english">English</a>
    <a href="#indonesia">Indonesia</a>
</div>   

</div>

<script src="script.js"></script>

<script>
    // Ambil elemen dari HTML
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const resultDiv = document.getElementById('result');

    // Event ketika form di-submit
    searchForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const keyword = searchInput.value.trim();
        
        if (!keyword) {
            alert('Masukkan kata kunci pencarian');
            return;
        }

        // Tampilkan loading
        resultDiv.innerHTML = '<p class="loading">Mencari...</p>';

        try {
            // PANGGIL BACKEND
            const response = await fetch(`https://seattle-search-backend.vercel.app/search?q=${encodeURIComponent(keyword)}`);
            const data = await response.json();
            
            if (data.success) {
                tampilkanHasil(data);
            } else {
                resultDiv.innerHTML = '<p>Error: ' + data.message + '</p>';
            }
        } catch (error) {
            resultDiv.innerHTML = '<p>Gagal terhubung ke backend. Pastikan backend Python sudah jalan.</p>';
            console.error('Error:', error);
        }
    });

    function tampilkanHasil(data) {
        if (data.total_results === 0) {
            resultDiv.innerHTML = '<p>Tidak ada hasil ditemukan</p>';
            return;
        }

        let html = `<h3>Hasil pencarian: "${data.keyword}" (${data.total_results} ditemukan)</h3>`;
        html += `<p><small>Metode: ${data.metadata.method} | Waktu: ${(data.metadata.execution_time * 1000).toFixed(2)} ms</small></p>`;
        
        data.results.forEach(item => {
            html += `
                <div class="result-card">
                    <h4>${item.name}</h4>
                    <p><strong>Kategori:</strong> ${item.category}</p>
                    <p>${item.description}</p>
                    ${item.depth !== undefined ? `<p><small>Depth: ${item.depth}</small></p>` : ''}
                </div>
            `;
        });
        
        resultDiv.innerHTML = html;
    }
</script>

</body>

</html>
